# ── Mazmorra 
# Submapa independiente (mapa_id 1) vinculado al exterior por una entrada/salida.
# El servidor lo carga via leerMundo() como un Mapa aparte; al pisar 'entrada' el jugador es transportado a la mazmorra. 
# entrada: celda del exterior -> aparece en (destino_x, destino_y) de la mazmorra.
# salida : celda de la mazmorra -> vuelve a (destino_x, destino_y) del exterior.
[[mazmorra]]
mapa_id = 1
ancho   = 40
alto    = 40
entrada = { x = 70, y = 50, destino_x = 2, destino_y = 2 }
salida  = { x = 1, y = 1, destino_x = 70, destino_y = 51 }

# Pisos de la mazmorra
