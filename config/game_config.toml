# ------------------------------------------------------------
[combate]

# Si el ataque no pudo ser esquivado le personaje recibirá
# un daño pero este podrá ser reducido según la
# defensa que le provea su armadura, escudo y/o casco

# Esquivar: rand(0,1)^agilidad < umbral
esquivar_umbral = 0.001

