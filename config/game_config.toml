# ------------------------------------------------------------
[experiencia]
limite_base   = 1000
limite_exp    = 1.8          # Limite = 1000 * nivel^1.8
bonus_nivel   = 10           # max(NivelOtro - Nivel + 10, 0)
exp_kill_max  = 0.1          # rand(0, 0.1) * VidaMaxOtro * factor
exp_perdida_muerte_pct = 0.10
# ------------------------------------------------------------
[oro]
max_exp       = 1.1          # OroMax = base * nivel^1.1
exceso_pct    = 0.50         # Puede tener hasta 50% extra "en exceso"
drop_npc_max  = 0.2          # rand(0, 0.2) * VidaMaxNPC
# Subimos a 10000 para ver como se comporta con nuestro cheat, luego lo bajamos a 100
oro_max_base = 100000.0

# ------------------------------------------------------------
[combate]

# Si el ataque no pudo ser esquivado le personaje recibirá
# un daño pero este podrá ser reducido según la
# defensa que le provea su armadura, escudo y/o casco

# Esquivar: rand(0,1)^agilidad < umbral
esquivar_umbral = 0.001
probabilidad_critico = 0.10

# Tiempo minimo de enfriamiento (en segundos) entre dos ataques de un mismo
# jugador. Limita el ritmo de golpe para evitar el spam de ataques.
cooldown_ataque_seg = 1.0

# Alcance máximo en celdas (distancia Manhattan) para armas a distancia
# y hechizos de báculo (regla 5.3). El melee siempre es adyacencia.
rango_vision_ataque = 8

