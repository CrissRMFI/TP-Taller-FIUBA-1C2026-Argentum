# ============================================================
#  Argentum Online — Archivo de configuración base
#  Todos los valores numéricos que conforman el juego estan en este archivo
#  Editar sin recompilar
# ============================================================

[servidor]
#puerto          = 7666
tick_ms          = 200        # Cada cuántos ms se actualiza el mundo
movimiento_jugador_ticks = 1  # Cada cuántos ticks el jugador avanza una celda mientras se mueve
#max_jugadores   = 300

# ------------------------------------------------------------
[persistencia]
# Persistencia de jugadores: dos archivos binarios. 'archivo_jugadores' guarda
# los RegistroJugador (struct de tamaño fijo) y 'archivo_indice' el diccionario
# nombre -> offset. El servidor carga el progreso al conectar y lo guarda al
# desconectar, periodicamente y al apagarse.
archivo_jugadores = "config/jugadores.bin"
archivo_indice    = "config/jugadores_indice.bin"
guardado_seg      = 60         # Cada cuántos segundos se persiste a los conectados (0 = desactivado)

# ------------------------------------------------------------
[vida]
#  [a definir (son valores arbitrrios)]
f_clase_guerrero  = 3.0
f_clase_paladin   = 2.5
f_clase_clerigo   = 2.0
f_clase_mago      = 1.5

# ------------------------------------------------------------
[mana]
