[experiencia]
limite_base   = 1000
limite_exp    = 1.8          # Limite = 1000 * nivel^1.8
bonus_nivel   = 10           # max(NivelOtro - Nivel + 10, 0)
exp_kill_max  = 0.1          # rand(0, 0.1) * VidaMaxOtro * factor

# ------------------------------------------------------------
[oro]
