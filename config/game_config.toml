cuerpo_golem     = 2205

# ------------------------------------------------------------
[mapa]
# Dimensiones del escenario en celdas.
# El terreno/tiles reales podrán cargarse luego desde archivo binario.
ancho = 100
alto  = 100

# Archivo TOML del que el servidor carga el escenario (paredes, ciudades/zonas seguras y NPCs) al arrancar. Lo genera el editor y es editable a mano.
archivo = "config/mapa.toml"

# Posicion ancla del spawn de jugadores. Al conectar, el servidor intenta
# ubicar al jugador en esta celda; si ya esta ocupada, busca la celda libre
# mas cercana mediante BFS. Esto permite N jugadores sin pre-declarar
# posiciones por cabeza.
[mapa.spawn]
x       = 50
y       = 50
mapa_id = 0

# ------------------------------------------------------------
[npcs]
# Distancia Manhattan maxima para interactuar con NPCs ciudadanos.
# 1 significa celda adyacente.
rango_interaccion = 5

# id de sprite de cuerpo con que el cliente dibuja cada NPC ciudadano.
# Deben coincidir con el catalogo de sprites del cliente (npc_sprite_resolver):
# es un contrato cliente-servidor (ver nota en el codigo).
cuerpo_sacerdote   = 1243
cuerpo_comerciante = 4071
cuerpo_banquero    = 4057

# Stock por TIPO de NPC: todos los comerciantes (y todos los sacerdotes)
# venden lo mismo. El servidor lo aplica al cargar el mapa. Los id deben existir
# en [items]. Para el comerciante, 'compra' es lo que paga el jugador al comprar
# y 'venta' lo que recibe al vender (compra > venta para que no sea un exploit).
[npcs.comerciante]
items = [
  { id = 1,  compra = 40,  venta = 15 },   # espada
  { id = 2,  compra = 55,  venta = 20 },   # hacha
  { id = 3,  compra = 70,  venta = 25 },   # martillo
  { id = 4,  compra = 40,  venta = 15 },   # arco simple
  { id = 5,  compra = 110, venta = 45 },   # arco compuesto
  { id = 10, compra = 50,  venta = 18 },   # armadura de cuero
  { id = 11, compra = 160, venta = 60 },   # armadura de placas
  { id = 12, compra = 80,  venta = 30 },   # tunica azul
  { id = 13, compra = 25,  venta = 9 },    # capucha
  { id = 14, compra = 60,  venta = 22 },   # casco de hierro
  { id = 15, compra = 120, venta = 45 },   # sombrero magico
  { id = 16, compra = 25,  venta = 9 },    # escudo de tortuga
  { id = 17, compra = 50,  venta = 18 },   # escudo de hierro
  { id = 18, compra = 12,  venta = 4 },    # pocion de vida chica
  { id = 19, compra = 30,  venta = 11 },   # pocion de vida grande
  { id = 20, compra = 12,  venta = 4 },    # pocion de mana chica
  { id = 21, compra = 30,  venta = 11 },   # pocion de mana grande
]

# El sacerdote vende baculos/varas (hechizos) y pociones. 'precio' es lo que
# paga el jugador (el sacerdote no compra items).
[npcs.sacerdote]
items = [
  { id = 6,  precio = 60 },    # vara de fresno
  { id = 7,  precio = 90 },    # baculo nudoso
  { id = 8,  precio = 180 },   # baculo engarzado
  { id = 9,  precio = 120 },   # flauta elfica
  { id = 18, precio = 12 },    # pocion de vida chica
  { id = 19, precio = 30 },    # pocion de vida grande
  { id = 20, precio = 12 },    # pocion de mana chica
  { id = 21, precio = 30 },    # pocion de mana grande
]

