# Catalogo unico de criaturas y NPCs de Argentum.
# Fuente unica consumida por:
#   - el server  : stats de combate + 'cuerpo' (sprite) al spawnear criaturas.
#   - el editor  : figura (sprite/src), nombre, descripcion y oro para el panel.
#   - el cliente : puede leerlo a futuro (cuerpo / datos de criatura).
#
# Cada [[criatura]] trae sus stats POR TIPO.
# 'fx_ataque' es el id de sprite del efecto de golpe que muestra el cliente al atacar (imgs/ataques/fx/<id>.png).

[[criatura]]
clave        = "goblin"
nombre       = "Goblin"
descripcion  = "Pequeña criatura salvaje y cobarde que merodea los campos en grupo, atacando cuerpo a cuerpo a cualquier viajero que se acerque demasiado."
vida_maxima  = 30
nivel        = 1
fuerza       = 4
agilidad     = 6
rango_aggro  = 4
danio_min    = 2
danio_max    = 5
cuerpo       = 2200
fx_ataque    = 14
oro          = 15
sprite       = ":/imgs/criaturas/goblin.png"
src          = [3, 6, 18, 25]

