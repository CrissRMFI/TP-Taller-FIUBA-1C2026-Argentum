# --- Criaturas EXCLUSIVAS de mazmorra (mucho mas fuertes que las del exterior)
# El oro y la experiencia que sueltan los calcula el server a partir de 'vida_maxima'
# 'respawn_ticks': ticks que tardan en reaparecer tras morir
# 'respawn_fijo': si es true reaparece en su posicion de inicio (su trono); si es
# false/ausente, en una celda libre al azar del mapa (como el exterior). Solo el jefe
# lo usa; conviene que un tipo con respawn_fijo tenga UNA sola criatura colocada.

