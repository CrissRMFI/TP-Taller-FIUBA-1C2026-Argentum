# ============================================================
#  Catalogo de audio del cliente
#  Mismo patron que sprites.toml: los paths son relativos a la
#  carpeta resources/. Editable sin recompilar.
# ============================================================

[general]
volumen_maestro = 90    # 0-100, escala todos los efectos
volumen_musica  = 55    # 0-100
radio_audible   = 18    # celdas: mas alla de esto, no suena

# ------------------------------------------------------------
#  Musica de fondo (loops). Se elige por clave segun el contexto.
# ------------------------------------------------------------
[musica.menu]
path = "sound/musicaMenu.ogg"

[musica.campo]
path = "sound/ambienteCampo.ogg"

[musica.ciudad]
path = "sound/ambienteCiudad.ogg"

[musica.combate]
path = "sound/musicaCombate.ogg"

